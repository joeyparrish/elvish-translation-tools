# Regression fixtures for scripts/transliterate.py against Tecendil's
# Sindarin (general) mode. Each `output` is captured by running the
# input through https://www.tecendil.com with mode set to Sindarin and
# copying the result.
#
# To add a case: paste the input into Tecendil, copy its output, and
# fill in the `output` field below. Re-run scripts/test_transliterate.py
# to confirm our engine matches.

 - input: "gwain dwedh angwedh"
   output: "ЬђЄЬЂњЬђќЬЂђЬђљ ЬђёЬЂњЬђїЬЂє ЬђЊЬЂђЬђЋЬђїЬЂє"

 - input: "mellon tollui"
   output: "ЬђЉЬђбЬЂєЬЂЉЬђљЬЂі ЬђђЬђбЬЂіЬЂЉЬђќЬЂї"

 - input: "miria-"
   output: "ЬђЉЬђаЬЂёЬђ«ЬЂёЬђ«ЬЂђ"

 - input: "daro d├«n"
   output: "ЬђёЬђаЬЂђЬђ«ЬЂіРђЅ ЬђёЬђгЬЂёЬђљ"

 # Coverage additions -- output fields to be filled from Tecendil.

 # Tests medial 'a' (default vowel) and final 'r' (the r$ rule -> {oore}).
 - input: "aglar"
   output: "ЬђЄЬЂђЬђбЬђћЬЂђ"

 # Tests the 'words' override: Tecendil rewrites Rohan -> Rochan, Rohir
 # -> Rochir, Rohirrim -> Rochirrim before rule application.
 - input: "Rohan"
   output: "ЬѓаЬђеЬЂіЬђљЬЂђ"

 - input: "rohan"
   output: "ЬђаЬђеЬЂіЬђљЬЂђ"

 # Tests the 'words' override: arnoediad maps to an explicit symbolic
 # sequence rather than being processed by the rule map.
 - input: "arnoediad"
   output: "ЬђаЬЂђЬђљЬђёЬЂєЬђ«ЬЂёЬђёЬЂђ"

 # Tests the '^lh' rule ({alda}) and the long-vowel pattern with 'aara'
 # (LONG CARRIER, U+E02C).
 - input: "lh├╗g"
   output: "ЬђБЬђгЬЂїЬђЄ"

 # Tests the '^rh' rule ({arda}) and long ├╗.
 - input: "rh├╗n"
   output: "ЬђАЬђгЬЂїЬђљ"

 # Tests 'ae' and 'ei' diphthongs.
 - input: "aear eithel"
   output: "ЬђфЬЂђЬђћЬЂђ ЬђќЬЂєЬђѕЬђбЬЂє"

 # Tests mid-word 'angw' -- the rule we previously misjudged as dead
 # code. dangweth "answer" (PM/395) has 'angw' starting at position 1,
 # where '^ang' does not match, so the 'angw' rule should fire.
 - input: "dangweth"
   output: "ЬђёЬђЄЬЂљЬЂњЬЂђЬђѕЬЂє"

 # Tests geminate 'nn' (e.g. ennyn "doors"; pennas "history").
 - input: "pennas"
   output: "ЬђЂЬђљЬЂљЬЂєЬђЦЬЂђ"

 # Tests 'ui' diphthong followed by a consonant.
 - input: "cuiol"
   output: "ЬђЃЬђќЬЂїЬђбЬЂі"

 # Multi-syllable with mixed vowels; canonical Sindarin proper name
 # (Gilthoniel from A Elbereth).
 - input: "gilthoniel"
   output: "ЬђЄЬђбЬЂёЬђѕЬђљЬЂіЬђ«ЬЂёЬђбЬЂє"
